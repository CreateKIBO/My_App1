<title>QuestPlan 日历</title>
<style>
:root {
  --bg: oklch(99% 0.002 240);
  --surface: oklch(100% 0 0);
  --fg: oklch(18% 0.012 250);
  --muted: oklch(54% 0.012 250);
  --border: oklch(92% 0.005 250);
  --accent: oklch(58% 0.18 255);
  --font-d: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  --font-b: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  --gold: oklch(78% 0.15 85);
  --gold-dark: oklch(55% 0.12 80);
  --xp: oklch(65% 0.18 155);
  --streak: oklch(62% 0.20 30);
  --cw: oklch(58% 0.14 260);
  --cs: oklch(55% 0.16 290);
  --cp: oklch(62% 0.18 155);
  --ca: oklch(68% 0.12 55);
  --r-s: 8px; --r-m: 12px; --r-l: 16px; --r-x: 20px; --r-p: 9999px;
  --sh: rgba(0,0,0,0.06) 0 0 0 1px, rgba(0,0,0,0.04) 0 2px 6px;
  --sh-lg: rgba(0,0,0,0.06) 0 0 0 1px, rgba(0,0,0,0.06) 0 8px 24px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:oklch(94% 0.005 250);color:var(--fg);display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}
.phone{width:390px;height:844px;background:var(--bg);border-radius:44px;overflow:hidden;position:relative;box-shadow:rgba(0,0,0,0.12) 0 0 0 1px,rgba(0,0,0,0.08) 0 24px 48px;display:flex;flex-direction:column}
.island{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:126px;height:36px;background:oklch(10% 0.02 250);border-radius:20px;z-index:100}
.statusbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 4px;font-size:14px;font-weight:600;flex-shrink:0}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 20px 100px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}

/* ── Month nav ── */
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:4px 0 16px}
.month-label{font-family:var(--font-d);font-size:22px;font-weight:700;letter-spacing:-0.02em}
.month-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s}
.month-btn:hover{background:var(--border)}
.month-btn svg{width:16px;height:16px;stroke:var(--fg);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.month-today{font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;padding:6px 12px;border-radius:var(--r-p);border:1px solid oklch(88% 0.06 255);background:oklch(96% 0.03 255);transition:all 0.15s}
.month-today:hover{background:oklch(94% 0.05 255)}

/* ── Streak banner ── */
.streak-banner{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,oklch(96% 0.04 30),oklch(97% 0.02 50));border-radius:var(--r-l);padding:12px 16px;margin-bottom:16px;border:1px solid oklch(90% 0.04 30)}
.streak-icon{font-size:24px;animation:flicker 1.5s ease-in-out infinite alternate}
.streak-text{flex:1}
.streak-num{font-family:var(--font-d);font-size:18px;font-weight:800;color:var(--streak);letter-spacing:-0.02em}
.streak-sub{font-size:11px;color:var(--muted);font-weight:500}
@keyframes flicker{0%{transform:scale(1)}100%{transform:scale(1.1)}}

/* ── Calendar grid ── */
.cal-card{background:var(--surface);border-radius:var(--r-x);padding:16px 12px;box-shadow:var(--sh);margin-bottom:16px}
.weekday-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px}
.wd{text-align:center;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.06em;padding:4px 0}
.wd.weekend{color:oklch(65% 0.08 30)}

.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}

.day{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;aspect-ratio:1;border-radius:var(--r-m);cursor:pointer;transition:all 0.18s;gap:3px}
.day:hover{background:oklch(97% 0.005 250)}
.day:active{transform:scale(0.95)}

.day.other{opacity:0.18;pointer-events:none}
.day .num{font-size:15px;font-weight:500;line-height:1;color:var(--fg);transition:color 0.15s}

/* Today ring */
.day.today .num{color:var(--accent);font-weight:700}
.day.today::before{content:'';position:absolute;inset:2px;border-radius:calc(var(--r-m) - 2px);border:2px solid var(--accent);opacity:0.3;pointer-events:none}

/* Selected */
.day.sel{background:var(--accent)}
.day.sel .num{color:#fff;font-weight:700}
.day.sel.today::before{border-color:#fff;opacity:0.4}

/* Task dots */
.dots{display:flex;gap:2px;height:6px;align-items:center;justify-content:center}
.dots span{width:5px;height:5px;border-radius:50%;transition:all 0.15s}
.dots .dw{background:var(--cw)}.dots .ds{background:var(--cs)}.dots .dp{background:var(--cp)}.dots .da{background:var(--ca)}
.day.sel .dots span{background:rgba(255,255,255,0.65)!important}

/* Streak dot */
.day.streak::after{content:'';position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:50%;background:var(--streak)}
.day.sel.streak::after{background:rgba(255,255,255,0.6)}

/* All-done star */
.day.all-done .num::after{content:' ★';font-size:7px;color:var(--gold);vertical-align:super}
.day.sel.all-done .num::after{color:rgba(255,255,255,0.7)}

/* ── Day detail panel ── */
.detail{background:var(--surface);border-radius:var(--r-x);padding:18px;box-shadow:var(--sh);margin-bottom:16px;animation:slideUp 0.25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.detail-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.detail-date{font-family:var(--font-d);font-size:17px;font-weight:700;letter-spacing:-0.01em}
.detail-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r-p);font-size:11px;font-weight:700}
.detail-badge.done-b{background:oklch(94% 0.06 155);color:var(--xp)}
.detail-badge.partial-b{background:oklch(95% 0.04 255);color:var(--accent)}

.task-list{display:flex;flex-direction:column;gap:8px}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--r-m);transition:all 0.15s}
.task-row:hover{background:oklch(97% 0.005 250)}
.task-row.finished{opacity:0.45}
.task-row.finished .task-name{text-decoration:line-through;color:var(--muted)}

.task-cat{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.task-cat.cat-w{background:var(--cw)}.task-cat.cat-s{background:var(--cs)}.task-cat.cat-p{background:var(--cp)}.task-cat.cat-a{background:var(--ca)}

.task-name{flex:1;font-size:14px;font-weight:500}
.task-time{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;flex-shrink:0}
.task-reward{display:flex;align-items:center;gap:2px;font-size:11px;font-weight:700;color:var(--gold-dark);flex-shrink:0}
.task-reward .mc{width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,var(--gold),oklch(72% 0.14 75));display:inline-flex;align-items:center;justify-content:center;font-size:6px;font-weight:900;color:oklch(30% 0.06 80)}

/* ── Legend ── */
.legend{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 0;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:500}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* ── Bottom bar ── */
.bottom-bar{position:absolute;bottom:0;left:0;right:0;height:82px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-around;padding-top:8px;z-index:10}
.bb-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 8px;border:none;background:none;font-family:var(--font-b)}
.bb-item svg{width:24px;height:24px;stroke:var(--muted);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.2s}
.bb-item span{font-size:10px;font-weight:500;color:var(--muted);transition:color 0.2s}
.bb-item.on svg{stroke:var(--accent)}.bb-item.on span{color:var(--accent)}

/* ── Toast ── */
.toast{position:absolute;top:64px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--fg);color:#fff;padding:10px 20px;border-radius:var(--r-p);font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:all 0.3s;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<div class="phone">

<script>
// ── Data ──
const now = new Date();
let viewYear = now.getFullYear();
let viewMonth = now.getMonth();
let selectedDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());

const taskData = {
  '2025-01-08': [{name:'晨间冥想',cat:'a',time:'07:00',coin:15,done:true},{name:'完成周报',cat:'w',time:'10:00',coin:30,done:true}],
  '2025-01-09': [{name:'阅读设计书',cat:'s',time:'08:30',coin:25,done:true},{name:'跑步 5km',cat:'p',time:'18:00',coin:20,done:true},{name:'整理文件',cat:'a',time:'20:00',coin:10,done:true}],
  '2025-01-10': [{name:'项目评审',cat:'w',time:'09:00',coin:35,done:true},{name:'英语听力',cat:'s',time:'19:00',coin:20,done:true}],
  '2025-01-11': [{name:'瑜伽课',cat:'p',time:'08:00',coin:20,done:true},{name:'写博客',cat:'s',time:'14:00',coin:25,done:true},{name:'做饭',cat:'a',time:'18:00',coin:10,done:true}],
  '2025-01-12': [{name:'晨间冥想',cat:'a',time:'07:00',coin:15,done:true},{name:'客户会议',cat:'w',time:'10:00',coin:30,done:true},{name:'跑步 3km',cat:'p',time:'17:00',coin:15,done:true},{name:'读书笔记',cat:'s',time:'21:00',coin:20,done:true}],
  '2025-01-13': [{name:'需求文档',cat:'w',time:'09:00',coin:35,done:true},{name:'冥想 15min',cat:'a',time:'07:00',coin:15,done:true},{name:'跑步 5km',cat:'p',time:'18:00',coin:20,done:true}],
  '2025-01-14': [{name:'晨间冥想',cat:'a',time:'07:00',coin:15,done:true},{name:'阅读设计书',cat:'s',time:'08:30',coin:25,done:true},{name:'完成项目周报',cat:'w',time:'10:00',coin:30,done:true},{name:'整理书桌',cat:'a',time:'20:00',coin:10,done:true}],
  '2025-01-15': [{name:'晨间冥想 15 分钟',cat:'a',time:'07:00',coin:15,done:true},{name:'阅读《设计心理学》第4章',cat:'s',time:'08:30',coin:25,done:true},{name:'完成项目周报',cat:'w',time:'10:00',coin:30,done:true},{name:'跑步 5 公里',cat:'p',time:'18:00',coin:20,done:false},{name:'整理书桌和文件',cat:'a',time:'20:00',coin:10,done:false}],
  '2025-01-16': [{name:'晨间冥想',cat:'a',time:'07:00',coin:15,done:false},{name:'代码评审',cat:'w',time:'10:00',coin:30,done:false},{name:'英语听力',cat:'s',time:'19:00',coin:20,done:false}],
  '2025-01-17': [{name:'项目评审会',cat:'w',time:'09:00',coin:35,done:false}],
  '2025-01-18': [{name:'瑜伽课',cat:'p',time:'08:00',coin:20,done:false},{name:'写技术博客',cat:'s',time:'14:00',coin:25,done:false}],
  '2025-01-20': [{name:'需求评审',cat:'w',time:'10:00',coin:35,done:false},{name:'跑步 5km',cat:'p',time:'18:00',coin:20,done:false}],
  '2025-01-22': [{name:'客户演示',cat:'w',time:'14:00',coin:40,done:false}],
};

const streakDates = new Set(['2025-01-08','2025-01-09','2025-01-10','2025-01-11','2025-01-12','2025-01-13','2025-01-14','2025-01-15']);
const allDoneDates = new Set(['2025-01-08','2025-01-09','2025-01-11','2025-01-12','2025-01-13','2025-01-14']);

const catMap = {w:'cat-w',s:'cat-s',p:'cat-p',a:'cat-a'};
const catLabel = {w:'工作',s:'学习',p:'运动',a:'个人'};
const catDot = {w:'dw',s:'ds',p:'dp',a:'da'};

// ── Render calendar ──
function render() {
  const first = new Date(viewYear, viewMonth, 1);
  const last = new Date(viewYear, viewMonth + 1, 0);
  const startDow = first.getDay();
  const daysInMonth = last.getDate();
  const prevLast = new Date(viewYear, viewMonth, 0).getDate();

  document.getElementById('month-label').textContent = `${viewYear} 年 ${viewMonth + 1} 月`;

  let html = '';

  // Previous month trailing days
  for (let i = startDow - 1; i >= 0; i--) {
    html += `<div class="day other"><span class="num">${prevLast - i}</span></div>`;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const key = formatDate(date);
    const isToday = date.toDateString() === now.toDateString();
    const isSel = date.toDateString() === selectedDate.toDateString();
    const tasks = taskData[key] || [];
    const isStreak = streakDates.has(key);
    const isAllDone = allDoneDates.has(key);

    let cls = 'day';
    if (isToday) cls += ' today';
    if (isSel) cls += ' sel';
    if (isStreak) cls += ' streak';
    if (isAllDone) cls += ' all-done';

    let dots = '';
    if (tasks.length) {
      const uniqueCats = [...new Set(tasks.map(t => t.cat))];
      dots = `<div class="dots">${uniqueCats.map(c => `<span class="${catDot[c]}"></span>`).join('')}</div>`;
    }

    html += `<div class="${cls}" onclick="selectDay(${viewYear},${viewMonth},${d})"><span class="num">${d}</span>${dots}</div>`;
  }

  // Next month leading days
  const totalCells = startDow + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="day other"><span class="num">${i}</span></div>`;
  }

  document.getElementById('days-grid').innerHTML = html;
  renderDetail();
}

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── Select day ──
function selectDay(y, m, d) {
  selectedDate = new Date(y, m, d);
  render();
}

// ── Render detail ──
function renderDetail() {
  const key = formatDate(selectedDate);
  const tasks = taskData[key] || [];
  const d = selectedDate;
  const weekdays = ['日','一','二','三','四','五','六'];
  const dateStr = `${d.getMonth()+1} 月 ${d.getDate()} 日 周${weekdays[d.getDay()]}`;

  const doneCount = tasks.filter(t => t.done).length;
  const badge = tasks.length === 0 ? '' :
    doneCount === tasks.length ?
    `<div class="detail-badge done-b">✓ 全部完成</div>` :
    `<div class="detail-badge partial-b">${doneCount}/${tasks.length} 已完成</div>`;

  let tasksHtml = '';
  if (tasks.length === 0) {
    tasksHtml = `<div style="text-align:center;padding:20px 0;color:var(--muted);font-size:14px">这天没有任务 🎉</div>`;
  } else {
    tasksHtml = tasks.map(t => `
      <div class="task-row${t.done ? ' finished' : ''}">
        <div class="task-cat ${catMap[t.cat]}"></div>
        <div class="task-name">${t.name}</div>
        <div class="task-time">${t.time}</div>
        <div class="task-reward"><span class="mc">¢</span>${t.coin}</div>
      </div>
    `).join('');
  }

  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-head">
      <div class="detail-date">${dateStr}</div>
      ${badge}
    </div>
    <div class="task-list">${tasksHtml}</div>
  `;
}

// ── Nav ──
function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  render();
}

function goToday() {
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();
  selectedDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  render();
}

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ── Init ──
render();
</script>
</body>
